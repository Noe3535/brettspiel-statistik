<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Event Feed Prototype</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #333;
      color: white;
      padding: 10px;
      display: flex;
      justify-content: space-around;
    }
    header button {
      background: #555;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 4px;
    }
    header button.active {
      background: #4CAF50;
    }
    .view {
      display: none;
      padding: 20px;
    }
    .view.active {
      display: block;
    }
    form {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    form input, form textarea {
      width: 100%;
      margin: 5px 0 10px;
      padding: 8px;
    }
    form button {
      padding: 10px 15px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    .event {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .event h3 {
      margin: 0;
    }
    .event p {
      margin: 5px 0;
    }
    .event button {
      margin-right: 10px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <button id="btnAdd" class="active">Event hinzufügen</button>
    <button id="btnFeed">Alle Partys</button>
    <button id="btnProfile">Mein Profil</button>
  </header>

  <div id="addView" class="view active">
    <h2>Event hinzufügen</h2>
    <form id="eventForm">
      <input type="text" id="title" placeholder="Event-Titel" required />
      <textarea id="description" placeholder="Beschreibung" required></textarea>
      <input type="date" id="date" required />
      <input type="text" id="location" placeholder="Standort" required />
      <button type="submit">Hinzufügen</button>
    </form>
  </div>

  <div id="feedView" class="view">
    <h2>Alle Partys</h2>
    <div id="eventList"></div>
  </div>

  <div id="profileView" class="view">
    <h2>Gespeicherte Events</h2>
    <div id="savedList"></div>
  </div>

  <script>
    // Buttons
    const btnAdd = document.getElementById('btnAdd');
    const btnFeed = document.getElementById('btnFeed');
    const btnProfile = document.getElementById('btnProfile');

    // Views
    const addView = document.getElementById('addView');
    const feedView = document.getElementById('feedView');
    const profileView = document.getElementById('profileView');

    const form = document.getElementById('eventForm');
    const eventList = document.getElementById('eventList');
    const savedList = document.getElementById('savedList');

    let events = JSON.parse(localStorage.getItem('events')) || [];
    let savedEvents = JSON.parse(localStorage.getItem('savedEvents')) || [];

    function showView(view) {
      addView.classList.remove('active');
      feedView.classList.remove('active');
      profileView.classList.remove('active');
      btnAdd.classList.remove('active');
      btnFeed.classList.remove('active');
      btnProfile.classList.remove('active');

      view.classList.add('active');
      if(view === addView) btnAdd.classList.add('active');
      if(view === feedView) btnFeed.classList.add('active');
      if(view === profileView) btnProfile.classList.add('active');
    }

    btnAdd.addEventListener('click', () => showView(addView));
    btnFeed.addEventListener('click', () => { showView(feedView); renderFeed(); });
    btnProfile.addEventListener('click', () => { showView(profileView); renderSaved(); });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const date = document.getElementById('date').value;
      const location = document.getElementById('location').value;

      const event = { id: Date.now(), title, description, date, location, likes: 0 };
      events.unshift(event);
      localStorage.setItem('events', JSON.stringify(events));

      form.reset();
      alert('Event hinzugefügt!');
    });

    function renderFeed() {
      eventList.innerHTML = '';
      events.forEach(event => {
        const div = document.createElement('div');
        div.className = 'event';
        div.innerHTML = `
          <h3>${event.title}</h3>
          <p>${event.description}</p>
          <p><strong>Datum:</strong> ${event.date}</p>
          <p><strong>Standort:</strong> ${event.location}</p>
          <p><strong>Likes:</strong> ${event.likes}</p>
          <button onclick="likeEvent(${event.id})">Like</button>
          <button onclick="saveEvent(${event.id})">Speichern</button>
        `;
        eventList.appendChild(div);
      });
    }

    function renderSaved() {
      savedList.innerHTML = '';
      savedEvents.forEach(event => {
        const div = document.createElement('div');
        div.className = 'event';
        div.innerHTML = `
          <h3>${event.title}</h3>
          <p>${event.description}</p>
          <p><strong>Datum:</strong> ${event.date}</p>
          <p><strong>Standort:</strong> ${event.location}</p>
        `;
        savedList.appendChild(div);
      });
    }

    window.likeEvent = function(id) {
      const event = events.find(e => e.id === id);
      if(event) {
        event.likes++;
        localStorage.setItem('events', JSON.stringify(events));
        renderFeed();
      }
    }

    window.saveEvent = function(id) {
      const event = events.find(e => e.id === id);
      if(event && !savedEvents.find(e => e.id === id)) {
        savedEvents.push(event);
        localStorage.setItem('savedEvents', JSON.stringify(savedEvents));
        alert('Event gespeichert!');
      }
    }
  </script>

</body>
</html>
